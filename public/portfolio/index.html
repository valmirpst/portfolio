<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecionando...</title>

    <!-- Meta Refresh Redirect -->
    <meta http-equiv="refresh" content="0; url=https://valmirpst.github.io/" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://valmirpst.github.io/" />

    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #0a0a0a;
        color: #fff;
      }
      .container {
        text-align: center;
      }
      a {
        color: #f59e0b;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>

    <!-- JavaScript Redirect (fallback) -->
    <script>
      window.location.replace("https://valmirpst.github.io/");
    </script>
  </head>
  <body>
    <div class="container">
      <h1>Redirecionando para valmirpst.github.io...</h1>
      <p>Se não for redirecionado automaticamente, <a href="https://valmirpst.github.io/">clique aqui</a>.</p>
    </div>
  </body>
</html>
